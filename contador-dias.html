<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relación Terminada - Darlenis & Jepherson</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #000 0%, #1a0000 50%, #330000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(0, 0, 0, 0.9);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(255, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
            border: 2px solid #cc0000;
        }

        h1 {
            font-size: 2.5rem;
            color: #cc0000;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255, 0, 0, 0.3);
        }

        .counter {
            font-size: 5rem;
            font-weight: bold;
            color: #cc0000;
            margin: 30px 0;
            text-shadow: 3px 3px 6px rgba(255, 0, 0, 0.4);
        }

        .label {
            font-size: 1.5rem;
            color: #cc0000;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .date-info {
            font-size: 1.2rem;
            color: #999;
            margin-top: 30px;
            font-style: italic;
        }

        .broken-heart {
            font-size: 5rem;
            margin-bottom: 10px;
            animation: shake 2s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            10% { transform: translateX(-5px) rotate(-3deg); }
            20% { transform: translateX(5px) rotate(3deg); }
            30% { transform: translateX(-3px) rotate(-2deg); }
            40% { transform: translateX(3px) rotate(2deg); }
            50% { transform: translateX(0) rotate(0deg); }
        }

        .hearts {
            font-size: 3rem;
            margin: 20px 0;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .details {
            margin-top: 30px;
            padding: 20px;
            background: rgba(204, 0, 0, 0.15);
            border-radius: 10px;
            border: 1px solid rgba(204, 0, 0, 0.3);
        }

        .detail-item {
            font-size: 1.1rem;
            color: #ccc;
            margin: 10px 0;
        }

        .detail-number {
            font-weight: bold;
            color: #cc0000;
            font-size: 1.3rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .counter {
                font-size: 3.5rem;
            }

            .label {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="broken-heart">💔</div>
        <h1>Darlenis & Jepherson</h1>
        
        <div class="counter" id="days-counter">62</div>
        <div class="label">Relación Terminada</div>
        
        <div class="date-info">
            Desde el <strong>19 de Enero de 2026</strong> hasta el <strong>22 de Marzo de 2026</strong>
        </div>

        <div class="details">
            <div class="detail-item">
                📅 <span class="detail-number">8</span> semanas juntos
            </div>
            <div class="detail-item">
                📆 <span class="detail-number">2</span> meses de amor
            </div>
            <div class="detail-item">
                ⏰ <span class="detail-number">1,488</span> horas compartidas
            </div>
            <div class="detail-item">
                💔 <span class="detail-number">0</span> momentos felices restantes
            </div>
        </div>

        <button onclick="window.location.href='index.html'" style="
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            font-weight: bold;
        ">
            ← Volver al Inicio
        </button>
    </div>

    <script>
        // Contador fijo en 62 días - nunca cambia
        document.getElementById('days-counter').textContent = '62';
    </script>
</body>
</html>
