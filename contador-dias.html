<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relación Terminada - Darlenis & Jepherson</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(128, 0, 128, 0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
            border: 3px solid #9b59b6;
        }

        h1 {
            font-size: 2.5rem;
            color: #8e44ad;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(155, 89, 182, 0.3);
        }

        .counter {
            font-size: 5rem;
            font-weight: bold;
            color: #9b59b6;
            margin: 30px 0;
            text-shadow: 3px 3px 6px rgba(155, 89, 182, 0.4);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .label {
            font-size: 1.5rem;
            color: #8e44ad;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .date-info {
            font-size: 1.2rem;
            color: #666;
            margin-top: 30px;
            font-style: italic;
        }

        .hearts {
            font-size: 5rem;
            margin-bottom: 10px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .error-bar {
            display: inline-block;
            background: linear-gradient(135deg, #ff8c00 0%, #ff6600 100%);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.4);
        }

        .details {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            border: 1px solid rgba(155, 89, 182, 0.3);
        }

        .detail-item {
            font-size: 1.1rem;
            color: #555;
            margin: 10px 0;
        }

        .detail-number {
            font-weight: bold;
            color: #9b59b6;
            font-size: 1.3rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .counter {
                font-size: 3.5rem;
            }

            .label {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hearts">❤️</div>
        <h1>Darlenis & Jepherson</h1>
        
        <div class="counter" id="days-counter">90</div>
        <div class="label">Días Juntos</div>
        
        <div class="date-info">
            Desde el <strong>19 de Enero de 2026</strong> hasta hoy
        </div>

        <div class="error-bar">
            ⛔ Error: Contador detenido el 22 de Marzo de 2026
        </div>

        <div class="details">
            <div class="detail-item">
                📅 <span class="detail-number">12</span> semanas juntos
            </div>
            <div class="detail-item">
                📆 <span class="detail-number">3</span> meses de amor
            </div>
            <div class="detail-item">
                ⏰ <span class="detail-number">2,160</span> horas compartidas
            </div>
            <div class="detail-item">
                ❤️ <span class="detail-number">90</span> momentos felices
            </div>
        </div>

        <button onclick="window.location.href='index.html'" style="
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            font-weight: bold;
        ">
            ← Volver al Inicio
        </button>
    </div>

    <script>
        // Contador desde 19/1/2026 hasta hoy 19/4/2026
        const startDate = new Date('2026-01-19');
        const today = new Date('2026-04-19');
        const diffTime = today - startDate;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        document.getElementById('days-counter').textContent = diffDays;
    </script>
</body>
</html>
